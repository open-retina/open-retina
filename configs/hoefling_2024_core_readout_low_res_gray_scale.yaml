defaults:
  - data_io: hoefling_2024
  - quality_checks: hoefling_2024
  - dataloader: hoefling_2024
  - model: core_gaussian_readout
  - optimizer: adamw
  - lr_scheduler: reduce_lr_on_plateau
  - training_callbacks:
      - early_stopping
      - lr_monitor
      - model_checkpoint
  - logger:
      - tensorboard
      - csv
  - trainer: default_deterministic
  - hydra: default
  - _self_ # values in this config will overwrite the defaults

exp_name: hoefling_2024_core_readout_low_res_filtered
seed: 42
check_stimuli_responses_match: false

dataloader:
  batch_size: 128

model:
  in_shape: [1, 150, 18, 16]
  hidden_channels: [64, 64]
  core:
    color_squashing_weights: [0.5, 0.5]
    temporal_kernel_sizes: [21,11]
    spatial_kernel_sizes: [5,5]
    gamma_input: 0.3624813307677683
    gamma_hidden: 0.06921409616730177
    gamma_in_sparse: 0.19659817938260804
    gamma_temporal: 1.0796350193789888
    dropout_rate: 0.11495349160329216
  readout:
    gamma: 0.05798085067125558
    init_mu_range: 0.3789100860365372
    init_sigma_range: 0.38555360470500916

  optimizer: ${optimizer}
  lr_scheduler: ${lr_scheduler}

data_io:
  retina_pixel_size_um: 50 # 4x bigger than high res model

paths:
  load_model_path: null # e.g. hoefling_2024_base_low_res or path to a .ckpt model
  cache_dir: ${oc.env:OPENRETINA_CACHE_DIRECTORY} # Remote files are downloaded to this location
  data_dir: ${paths.cache_dir}/data/ # Folder where local files are read from.
  log_dir: "." # Used as parent for output_dir. Will store train logs.
  output_dir: ${hydra:runtime.output_dir} # Modify subpaths in the "hydra/default.yaml" config
  movies_path: "/gpfs01/euler/User/tzenkel/openretina_cache/euler_lab/hoefling_2024/stimuli/rgc_natstim_18x16_joint_normalized_2024-01-11.pkl"
  responses_path: "/gpfs01/euler/User/tzenkel/openretina_cache/euler_lab/hoefling_2024/responses/rgc_natstim_2024-08-14.h5"

matmul_precision:
  _target_: torch.set_float32_matmul_precision
  precision: highest

trainer:
  max_epochs: 100
  accumulate_grad_batches: 1
  gradient_clip_val: 1

only_train_readout: false # whether or not to freeze core parameters and only train readout (eg. when finetuning model to new data)
